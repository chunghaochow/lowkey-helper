<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lowkey Helper</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="popup-shell">
      <header class="hero">
        <div class="hero__badge">LH</div>
        <div>
          <p class="hero__eyebrow">Lowkey Helper</p>
          <h1 class="hero__title">低调助手</h1>
        </div>
      </header>

      <section class="card">
        <div class="site-summary">
          <p class="site-summary__label">当前网站</p>
          <h2 class="site-summary__title" id="site-name">识别中...</h2>
          <p class="site-summary__url" id="site-host">请稍候</p>
        </div>

        <div id="supported-view" hidden>
          <div id="site-toggle"></div>
          <div class="rule-list" id="rule-list"></div>
        </div>

        <div class="empty-state" id="unsupported-view" hidden>
          <p class="empty-state__title">当前网站没有预设规则</p>
          <p class="empty-state__desc">
            你可以在代码配置文件中继续补充站点和 className 规则。
          </p>
        </div>
      </section>
    </main>

    <script src="../src/config/sites.js"></script>
    <script src="./popup.js"></script>
  </body>
</html>
